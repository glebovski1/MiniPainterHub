name: Deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - master
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy (branch, tag, or SHA)'
        required: true
        default: master
        type: string

permissions:
  contents: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest
    environment: production
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'master'
      )
    env:
      AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}
      AZURE_WEBAPP_HOSTNAME: ${{ vars.AZURE_WEBAPP_HOSTNAME }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_WEBAPP_STAGING_SLOT: ${{ vars.AZURE_WEBAPP_STAGING_SLOT }}
      AZURE_WEBAPP_STAGING_HOSTNAME: ${{ vars.AZURE_WEBAPP_STAGING_HOSTNAME }}
      AZURE_WEBAPP_STAGING_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_STAGING_PUBLISH_PROFILE }}
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
    steps:
      - name: Checkout deploy ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Resolve deployment refs
        id: deployment_refs
        shell: bash
        run: |
          set -euo pipefail

          deploy_sha="$(git rev-parse HEAD)"
          echo "deploy_sha=$deploy_sha" >> "$GITHUB_OUTPUT"
          echo "Deploying $deploy_sha"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Validate deployment configuration
        shell: bash
        run: |
          set -euo pipefail

          required_names=(
            AZURE_WEBAPP_NAME
            AZURE_WEBAPP_HOSTNAME
            AZURE_RESOURCE_GROUP
            AZURE_WEBAPP_STAGING_SLOT
            AZURE_WEBAPP_STAGING_HOSTNAME
            AZURE_WEBAPP_STAGING_PUBLISH_PROFILE
            AZURE_CREDENTIALS
          )

          missing=false
          for name in "${required_names[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "::error title=Missing deployment configuration::$name is not configured in the production GitHub environment."
              missing=true
            fi
          done

          if [ "$missing" = true ]; then
            exit 1
          fi

      - name: Restore
        run: dotnet restore MiniPainterHub.sln

      - name: Publish server artifact
        run: dotnet publish MiniPainterHub.Server/MiniPainterHub.Server.csproj --configuration Release --no-restore --output artifacts/publish/server

      - name: Deploy to staging slot
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: ${{ env.AZURE_WEBAPP_STAGING_SLOT }}
          publish-profile: ${{ env.AZURE_WEBAPP_STAGING_PUBLISH_PROFILE }}
          package: artifacts/publish/server

      - name: Verify staging health endpoint
        shell: bash
        run: |
          set -euo pipefail

          health_url="https://${AZURE_WEBAPP_STAGING_HOSTNAME}/healthz"
          for attempt in {1..12}; do
            status="$(curl --silent --show-error --location --output /dev/null --write-out '%{http_code}' "$health_url" || true)"
            if [ "$status" = "200" ]; then
              echo "Staging health check passed at $health_url"
              exit 0
            fi

            echo "Staging health check attempt $attempt returned HTTP $status; retrying in 10 seconds."
            sleep 10
          done

          echo "::error title=Staging health check failed::$health_url did not return HTTP 200. Production was not changed."
          exit 1

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ env.AZURE_CREDENTIALS }}

      - name: Swap staging into production
        shell: bash
        run: |
          set -euo pipefail

          az webapp deployment slot swap \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEBAPP_NAME" \
            --slot "$AZURE_WEBAPP_STAGING_SLOT" \
            --target-slot production

      - name: Verify production health endpoint
        id: verify_production
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail

          health_url="https://${AZURE_WEBAPP_HOSTNAME}/healthz"
          for attempt in {1..12}; do
            status="$(curl --silent --show-error --location --output /dev/null --write-out '%{http_code}' "$health_url" || true)"
            if [ "$status" = "200" ]; then
              echo "Production health check passed at $health_url"
              exit 0
            fi

            echo "Production health check attempt $attempt returned HTTP $status; retrying in 10 seconds."
            sleep 10
          done

          echo "::error title=Production health check failed::$health_url did not return HTTP 200 after slot swap."
          exit 1

      - name: Swap back after failed production health check
        if: steps.verify_production.outcome == 'failure'
        shell: bash
        run: |
          set -euo pipefail

          echo "::warning title=Swapping back::Production health check failed after swap. Restoring previous production build from ${AZURE_WEBAPP_STAGING_SLOT}."
          az webapp deployment slot swap \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEBAPP_NAME" \
            --slot "$AZURE_WEBAPP_STAGING_SLOT" \
            --target-slot production

      - name: Verify restored production health endpoint
        if: steps.verify_production.outcome == 'failure'
        shell: bash
        run: |
          set -euo pipefail

          health_url="https://${AZURE_WEBAPP_HOSTNAME}/healthz"
          for attempt in {1..12}; do
            status="$(curl --silent --show-error --location --output /dev/null --write-out '%{http_code}' "$health_url" || true)"
            if [ "$status" = "200" ]; then
              echo "Restored production health check passed at $health_url"
              exit 0
            fi

            echo "Restored production health check attempt $attempt returned HTTP $status; retrying in 10 seconds."
            sleep 10
          done

          echo "::error title=Restored production health check failed::$health_url did not return HTTP 200 after swap-back."
          exit 1

      - name: Mark deployment as last known good
        if: steps.verify_production.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail

          deploy_sha="${{ steps.deployment_refs.outputs.deploy_sha }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag --force production-last-good "$deploy_sha"
          git push --force origin refs/tags/production-last-good
          echo "Marked $deploy_sha as production-last-good."

      - name: Fail after swap-back
        if: steps.verify_production.outcome == 'failure'
        shell: bash
        run: |
          echo "::error title=Production deployment rejected::Health check failed for ${{ steps.deployment_refs.outputs.deploy_sha }} after slot swap. Swap-back was attempted."
          exit 1
