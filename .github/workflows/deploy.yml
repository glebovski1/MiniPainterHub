name: Deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - master
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy (branch, tag, or SHA)'
        required: true
        default: master
        type: string

permissions:
  contents: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest
    environment: production
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'master'
      )
    env:
      AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}
      AZURE_WEBAPP_HOSTNAME: ${{ vars.AZURE_WEBAPP_HOSTNAME }}
      AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
      PRODUCTION_SQL_CONNECTION_STRING: ${{ secrets.PRODUCTION_SQL_CONNECTION_STRING }}
    steps:
      - name: Checkout deploy ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Resolve deployment refs
        id: deployment_refs
        shell: bash
        run: |
          set -euo pipefail

          deploy_sha="$(git rev-parse HEAD)"
          echo "deploy_sha=$deploy_sha" >> "$GITHUB_OUTPUT"
          echo "Deploying $deploy_sha"

          git fetch --force origin 'refs/tags/production-last-good:refs/tags/production-last-good' || true
          rollback_sha=""
          if git rev-parse --verify --quiet refs/tags/production-last-good^{commit} >/dev/null; then
            rollback_sha="$(git rev-parse refs/tags/production-last-good^{commit})"
          elif git rev-parse --verify --quiet HEAD^ >/dev/null; then
            rollback_sha="$(git rev-parse HEAD^)"
            echo "::warning title=No last-known-good tag::Falling back to the parent commit for rollback."
          fi

          if [ -n "$rollback_sha" ] && [ "$rollback_sha" = "$deploy_sha" ]; then
            if git rev-parse --verify --quiet HEAD^ >/dev/null; then
              rollback_sha="$(git rev-parse HEAD^)"
              echo "::warning title=Last-known-good equals current deploy::Using the parent commit for rollback."
            else
              rollback_sha=""
            fi
          fi

          if [ -n "$rollback_sha" ]; then
            echo "Rollback target: $rollback_sha"
          else
            echo "::warning title=Rollback target unavailable::No production-last-good tag or parent commit is available."
          fi

          echo "rollback_sha=$rollback_sha" >> "$GITHUB_OUTPUT"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Validate deployment configuration
        shell: bash
        run: |
          set -euo pipefail

          required_names=(
            AZURE_WEBAPP_NAME
            AZURE_WEBAPP_HOSTNAME
            AZURE_WEBAPP_PUBLISH_PROFILE
            PRODUCTION_SQL_CONNECTION_STRING
          )

          missing=false
          for name in "${required_names[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "::error title=Missing deployment configuration::$name is not configured in the production GitHub environment."
              missing=true
            fi
          done

          if [ "$missing" = true ]; then
            exit 1
          fi

      - name: Resolve production SQL connection
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "${PRODUCTION_SQL_CONNECTION_STRING:-}" ]; then
            echo "Using PRODUCTION_SQL_CONNECTION_STRING from the production GitHub environment."
            exit 0
          fi

          echo "PRODUCTION_SQL_CONNECTION_STRING is not configured; resolving DefaultConnection from App Service."
          python - <<'PY'
          import base64
          import binascii
          import json
          import os
          import sys
          import uuid
          import xml.etree.ElementTree as ET
          from urllib.request import Request, urlopen

          publish_profile = os.environ.get("AZURE_WEBAPP_PUBLISH_PROFILE", "")
          if not publish_profile:
              sys.exit("AZURE_WEBAPP_PUBLISH_PROFILE is unavailable.")

          try:
              root = ET.fromstring(publish_profile)
          except ET.ParseError as error:
              sys.exit(f"AZURE_WEBAPP_PUBLISH_PROFILE is not valid XML: {error}")

          profiles = root.findall(".//publishProfile")
          profile = next(
              (
                  candidate
                  for candidate in profiles
                  if (
                      candidate.attrib.get("publishMethod", "").lower() == "zipdeploy"
                      or ".scm." in candidate.attrib.get("publishUrl", "").lower()
                  )
                  and candidate.attrib.get("userName")
                  and candidate.attrib.get("userPWD")
              ),
              None,
          )
          if profile is None:
              sys.exit("The publish profile does not contain App Service SCM credentials.")

          publish_url = profile.attrib["publishUrl"].strip()
          if not publish_url.startswith(("http://", "https://")):
              publish_url = f"https://{publish_url}"
          credentials = base64.b64encode(
              f"{profile.attrib['userName']}:{profile.attrib['userPWD']}".encode("utf-8")
          ).decode("ascii")
          powershell = (
              "powershell.exe -NoProfile -NonInteractive -ExecutionPolicy Bypass -Command \""
              "$matches = @(Get-ChildItem Env: | Where-Object { "
              "((($_.Name -replace '[^A-Za-z0-9]', '').ToLower()).EndsWith('defaultconnection')) "
              "}); "
              "$values = @($matches | ForEach-Object { $_.Value } | Sort-Object -Unique); "
              "if ($values.Count -ne 1) { exit 42 }; "
              "[Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($values[0]))\""
          )
          command_payload = json.dumps(
              {"command": powershell, "dir": r"D:\home"}
          ).encode("utf-8")
          request = Request(
              f"{publish_url.rstrip('/')}/api/command",
              data=command_payload,
              headers={
                  "Accept": "application/json",
                  "Authorization": f"Basic {credentials}",
                  "Content-Type": "application/json",
              },
          )

          try:
              with urlopen(request, timeout=30) as response:
                  command_result = json.load(response)
          except Exception as error:
              sys.exit(f"Unable to inspect App Service configuration through SCM: {error}")

          normalized_result = {
              str(key).lower(): value for key, value in command_result.items()
          }
          if normalized_result.get("exitcode") != 0:
              sys.exit(
                  "App Service did not expose exactly one DefaultConnection value. "
                  "Configure PRODUCTION_SQL_CONNECTION_STRING explicitly."
              )

          encoded_connection = str(normalized_result.get("output", "")).strip()
          try:
              connection_string = base64.b64decode(
                  encoded_connection, validate=True
              ).decode("utf-8")
          except (binascii.Error, UnicodeDecodeError):
              sys.exit("App Service returned an invalid encoded DefaultConnection value.")

          if not connection_string:
              sys.exit("App Service returned an empty DefaultConnection value.")

          escaped_mask = (
              str(connection_string)
              .replace("%", "%25")
              .replace("\r", "%0D")
              .replace("\n", "%0A")
          )
          print(f"::add-mask::{escaped_mask}")

          delimiter = f"mph_{uuid.uuid4().hex}"
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
              env_file.write(
                  f"PRODUCTION_SQL_CONNECTION_STRING<<{delimiter}\n"
                  f"{connection_string}\n"
                  f"{delimiter}\n"
              )

          print("Resolved DefaultConnection from the App Service environment.")
          PY

      - name: Restore
        run: dotnet restore MiniPainterHub.sln

      - name: Publish server artifact
        run: dotnet publish MiniPainterHub.Server/MiniPainterHub.Server.csproj --configuration Release --no-restore --output artifacts/publish/server

      - name: Install EF migration tool
        run: dotnet tool install --global dotnet-ef --version 10.0.5

      - name: Apply production database migrations
        shell: bash
        run: |
          set -euo pipefail

          max_attempts=4
          transient_pattern='Error Number:(40613|40197|40501|4060|10928|10929|49918|49919|49920)|likely due to a transient failure'

          for attempt in $(seq 1 "$max_attempts"); do
            migration_log="$(mktemp)"
            set +e
            dotnet ef database update \
              --project MiniPainterHub.Server/MiniPainterHub.Server.csproj \
              --startup-project MiniPainterHub.Server/MiniPainterHub.Server.csproj \
              --configuration Release \
              --connection "$PRODUCTION_SQL_CONNECTION_STRING" 2>&1 | tee "$migration_log"
            exit_code=${PIPESTATUS[0]}
            set -e

            if [ "$exit_code" -eq 0 ]; then
              rm -f "$migration_log"
              exit 0
            fi

            if ! grep --extended-regexp --ignore-case --quiet "$transient_pattern" "$migration_log"; then
              rm -f "$migration_log"
              exit "$exit_code"
            fi

            if [ "$attempt" -eq "$max_attempts" ]; then
              rm -f "$migration_log"
              echo "::error title=Production database unavailable::EF migrations still failed after $max_attempts transient retries."
              exit "$exit_code"
            fi

            retry_delay=$((attempt * 20))
            rm -f "$migration_log"
            echo "::warning title=Transient Azure SQL failure::Migration attempt $attempt failed transiently; retrying in ${retry_delay}s."
            sleep "$retry_delay"
          done

      - name: Deploy to existing Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ env.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: artifacts/publish/server

      - name: Verify health endpoint
        id: verify_current
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail

          health_url="https://${AZURE_WEBAPP_HOSTNAME}/healthz/ready"
          for attempt in {1..12}; do
            status="$(curl --silent --show-error --location --output /dev/null --write-out '%{http_code}' "$health_url" || true)"
            if [ "$status" = "200" ]; then
              echo "Health check passed at $health_url"
              exit 0
            fi

            echo "Health check attempt $attempt returned HTTP $status; retrying in 10 seconds."
            sleep 10
          done

          echo "::error title=Production health check failed::$health_url did not return HTTP 200 after deployment."
          exit 1

      - name: Prepare rollback artifact
        if: steps.verify_current.outcome == 'failure' && steps.deployment_refs.outputs.rollback_sha != ''
        shell: bash
        run: |
          set -euo pipefail

          rollback_sha="${{ steps.deployment_refs.outputs.rollback_sha }}"
          echo "::warning title=Rolling back deployment::Current deployment failed health checks. Preparing rollback artifact from $rollback_sha."
          git checkout --force "$rollback_sha"
          dotnet restore MiniPainterHub.sln
          dotnet publish MiniPainterHub.Server/MiniPainterHub.Server.csproj --configuration Release --no-restore --output artifacts/publish/rollback-server

      - name: Roll back Azure Web App
        if: steps.verify_current.outcome == 'failure' && steps.deployment_refs.outputs.rollback_sha != ''
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ env.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: artifacts/publish/rollback-server

      - name: Verify rollback health endpoint
        if: steps.verify_current.outcome == 'failure' && steps.deployment_refs.outputs.rollback_sha != ''
        shell: bash
        run: |
          set -euo pipefail

          health_url="https://${AZURE_WEBAPP_HOSTNAME}/healthz/ready"
          for attempt in {1..12}; do
            status="$(curl --silent --show-error --location --output /dev/null --write-out '%{http_code}' "$health_url" || true)"
            if [ "$status" = "200" ]; then
              echo "Rollback health check passed at $health_url"
              exit 0
            fi

            echo "Rollback health check attempt $attempt returned HTTP $status; retrying in 10 seconds."
            sleep 10
          done

          echo "::error title=Rollback health check failed::$health_url did not return HTTP 200 after rollback."
          exit 1

      - name: Mark deployment as last known good
        if: steps.verify_current.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail

          deploy_sha="${{ steps.deployment_refs.outputs.deploy_sha }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag --force production-last-good "$deploy_sha"
          git push --force origin refs/tags/production-last-good
          echo "Marked $deploy_sha as production-last-good."

      - name: Fail after rollback
        if: steps.verify_current.outcome == 'failure'
        shell: bash
        run: |
          if [ -z "${{ steps.deployment_refs.outputs.rollback_sha }}" ]; then
            echo "::error title=Production deployment failed::Health check failed and no rollback target was available."
          else
            echo "::error title=Production deployment rolled back::Health check failed for ${{ steps.deployment_refs.outputs.deploy_sha }}. Rolled back to ${{ steps.deployment_refs.outputs.rollback_sha }}."
          fi
          exit 1
