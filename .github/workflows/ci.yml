name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main
  release:
    types:
      - published

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore MiniPainterHub.sln

      - name: Build
        run: dotnet build MiniPainterHub.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test MiniPainterHub.Server.Tests/MiniPainterHub.Server.Tests.csproj --configuration Release --no-build --logger "trx;LogFileName=server-tests.trx" --collect:"XPlat Code Coverage" --results-directory artifacts/test-results

      - name: Test WebApp components
        run: dotnet test MiniPainterHub.WebApp.Tests/MiniPainterHub.WebApp.Tests.csproj --configuration Release --no-build --logger "trx;LogFileName=webapp-tests.trx" --collect:"XPlat Code Coverage" --results-directory artifacts/test-results

      - name: Detect test file changes for anti-flake rerun
        if: github.event_name == 'pull_request'
        id: test_changes
        shell: bash
        run: |
          set -euo pipefail
          changed_files="$(git diff --name-only '${{ github.event.pull_request.base.sha }}' '${{ github.sha }}')"
          if echo "$changed_files" | grep -Eq '^(MiniPainterHub\.Server\.Tests/|MiniPainterHub\.WebApp\.Tests/|e2e/tests/)'; then
            echo "tests_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "tests_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Anti-flake rerun server tests
        if: github.event_name == 'pull_request' && steps.test_changes.outputs.tests_changed == 'true'
        run: dotnet test MiniPainterHub.Server.Tests/MiniPainterHub.Server.Tests.csproj --configuration Release --no-build --logger "trx;LogFileName=server-tests-rerun.trx" --results-directory artifacts/test-results

      - name: Anti-flake rerun WebApp tests
        if: github.event_name == 'pull_request' && steps.test_changes.outputs.tests_changed == 'true'
        run: dotnet test MiniPainterHub.WebApp.Tests/MiniPainterHub.WebApp.Tests.csproj --configuration Release --no-build --logger "trx;LogFileName=webapp-tests-rerun.trx" --results-directory artifacts/test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-and-coverage
          path: artifacts/test-results
          retention-days: 7

  browser-smoke:
    name: ui-smoke
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Restore .NET packages
        run: dotnet restore MiniPainterHub.sln

      - name: Install npm dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browser
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        working-directory: e2e
        env:
          CI: true
        run: npm run test:smoke

      - name: Resolve UI review scope
        if: github.event_name == 'pull_request'
        id: ui_review_scope
        working-directory: e2e
        shell: bash
        run: |
          set -euo pipefail
          npm run ui-review:scope -- --base "${{ github.event.pull_request.base.sha }}" --head "${{ github.sha }}" --output .ui-review-scope.json > /dev/null
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");
          const scopePath = path.resolve("..", ".ui-review-scope.json");
          const scope = JSON.parse(fs.readFileSync(scopePath, "utf8"));
          const command = scope.scope === "full" ? "test:ui-review:full" : "test:ui-review";
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `scope=${scope.scope}\ncommand=${command}\n`);
          NODE

      - name: Run Playwright UI review
        if: steps.ui_review_scope.outputs.scope != 'none'
        working-directory: e2e
        env:
          CI: true
          UI_REVIEW_SCOPE_FILE: ${{ github.workspace }}/.ui-review-scope.json
        run: npm run ${{ steps.ui_review_scope.outputs.command }}

      - name: Assert UI review artifacts exist
        if: steps.ui_review_scope.outputs.scope != 'none'
        shell: bash
        run: |
          set -euo pipefail
          test -f output/playwright/ui-review/manifest.json
          test -f output/playwright/ui-review/report.md

      - name: Upload UI review artifacts
        if: always() && steps.ui_review_scope.outputs.scope != 'none'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-ui-review-pr-artifacts
          path: output/playwright/ui-review
          retention-days: 7

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-pr-failure-artifacts
          path: |
            e2e/playwright-report
            e2e/test-results
            output/playwright/ui-review
          retention-days: 7

  hard-tests:
    name: Hard Tests (master/main push + release publish)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'release' ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Restore .NET packages
        run: dotnet restore MiniPainterHub.sln

      - name: Run server tests with coverage (hard gate)
        run: dotnet test MiniPainterHub.Server.Tests/MiniPainterHub.Server.Tests.csproj --configuration Release --no-restore --logger "trx;LogFileName=server-tests-hard.trx" --collect:"XPlat Code Coverage" --results-directory artifacts/test-results

      - name: Install npm dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browser
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        working-directory: e2e
        env:
          CI: true
        run: npm run test:smoke

      - name: Enforce MiniPainterHub.Server coverage baseline (80%)
        shell: pwsh
        run: ./tools/coverage/check-server-coverage.ps1 -CoverageRoot artifacts/test-results -AssemblyName MiniPainterHub.Server -Threshold 80

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-failure-artifacts
          path: |
            e2e/playwright-report
            e2e/test-results
          retention-days: 7
