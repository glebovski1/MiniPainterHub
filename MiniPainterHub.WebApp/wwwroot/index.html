<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A shared workbench for miniature painters to show their process, exchange useful critique, and discover paint recipes and techniques." />
    <meta name="theme-color" content="#1F5B52" />
    <title>MiniPainterHub</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="preload"
          href="css/fonts.css"
          as="style"
          onload="this.onload=null;this.rel='stylesheet'" />
    <noscript>
        <link href="css/fonts.css" rel="stylesheet" />
    </noscript>
    <link rel="stylesheet" href="css/bootstrap-icons-subset.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/app-polish.css" />
    <link rel="icon" type="image/svg+xml" href="brand/minipainterhub-favicon.svg" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="brand/minipainterhub-icon-192.png" />
    <link href="MiniPainterHub.WebApp.styles.css?v=20260711-viewer-controls-fade" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <div class="loading-progress-shell boot-shell" aria-busy="true" aria-label="Loading MiniPainterHub">
            <div class="boot-shell__page">
                <header class="boot-shell__hero">
                    <div class="boot-shell__eyebrow"></div>
                    <div class="boot-shell__title"></div>
                    <div class="boot-shell__copy"></div>
                    <div class="boot-shell__actions">
                        <span></span>
                        <span></span>
                    </div>
                </header>
                <section class="boot-shell__surface" aria-hidden="true">
                    <div class="boot-shell__section-kicker"></div>
                    <div class="boot-shell__section-title"></div>
                    <div class="boot-shell__section-copy"></div>
                    <div class="boot-shell__grid">
                        <article class="boot-shell__card">
                            <div class="boot-shell__media"></div>
                            <div class="boot-shell__line boot-shell__line--strong"></div>
                            <div class="boot-shell__line"></div>
                            <div class="boot-shell__line boot-shell__line--short"></div>
                        </article>
                        <article class="boot-shell__card">
                            <div class="boot-shell__media"></div>
                            <div class="boot-shell__line boot-shell__line--strong"></div>
                            <div class="boot-shell__line"></div>
                            <div class="boot-shell__line boot-shell__line--short"></div>
                        </article>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3"></div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <button type="button" class="dismiss" aria-label="Dismiss error">x</button>
    </div>
    <script>
        window.miniPainterHubPerf = window.miniPainterHubPerf || { bootStart: performance.now() };
    </script>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="JSHelpers/navigationInterop.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="JSHelpers/domHelpers.js" defer></script>
    <script>
        window.bootstrapToaster = {
            show(message, header, type) {
                const container = document.getElementById('toast-container');
                if (!container) {
                    return;
                }

                const toastElement = document.createElement('div');
                const variant = type || 'primary';
                const isAssertive = variant === 'danger' || variant === 'warning';
                toastElement.className = `toast align-items-center text-bg-${variant} border-0 shadow`;
                toastElement.setAttribute('role', isAssertive ? 'alert' : 'status');
                toastElement.setAttribute('aria-live', isAssertive ? 'assertive' : 'polite');
                toastElement.setAttribute('aria-atomic', 'true');

                toastElement.innerHTML = `
                    <div class="toast-header bg-transparent border-0">
                        <strong class="me-auto"></strong>
                        <button type="button" class="btn-close" aria-label="Close"></button>
                    </div>
                    <div class="toast-body"></div>`;

                toastElement.querySelector('.me-auto').textContent = header || 'Notice';
                toastElement.querySelector('.toast-body').innerHTML = message || '';
                container.appendChild(toastElement);

                const removeToast = () => {
                    toastElement.classList.remove('show');
                    window.setTimeout(() => toastElement.remove(), 180);
                };

                toastElement.querySelector('.btn-close')?.addEventListener('click', removeToast, { once: true });
                window.requestAnimationFrame(() => toastElement.classList.add('show'));
                window.setTimeout(removeToast, 4000);
            }
        };
    </script>
    <script>
        window.addEventListener('load', () => {
            const warmupScript = document.createElement('script');
            warmupScript.src = 'JSHelpers/runtimeWarmup.js';
            warmupScript.async = true;
            document.head.appendChild(warmupScript);
        }, { once: true });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                let serviceWorkerRegistrationStarted = false;
                const registerServiceWorker = () => {
                    if (serviceWorkerRegistrationStarted) {
                        return;
                    }

                    serviceWorkerRegistrationStarted = true;
                    navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' })
                        .catch(() => { });
                };
                const registerWhenHidden = () => {
                    if (document.visibilityState === 'hidden') {
                        document.removeEventListener('visibilitychange', registerWhenHidden);
                        registerServiceWorker();
                    }
                };

                document.addEventListener('visibilitychange', registerWhenHidden);
            });
        }
    </script>
</body>

</html>
